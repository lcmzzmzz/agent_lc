<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EcomResearcher · Demo 评估对比台</title>
<style>
  /* 与 ecommerce.html 一致的暗色主题变量，保持同款观感 */
  :root { --bg:#0f172a; --card:#1e293b; --border:#334155; --txt:#e2e8f0; --mut:#94a3b8; --acc:#38bdf8; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; line-height:1.6; }
  header { padding:20px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:20px; margin:0; }
  header .sub { color:var(--mut); font-size:13px; }
  main { max-width:1100px; margin:0 auto; padding:24px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:18px; }
  .pill { display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; background:#0b1220; border:1px solid var(--border); }
  .ok { color:var(--ok); } .warn { color:var(--warn); } .bad { color:var(--bad); }

  /* 快速导航 */
  .nav { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:4px; }
  .nav a { color:var(--acc); text-decoration:none; padding:6px 12px; border:1px solid var(--border); border-radius:8px; background:#0b1220; font-size:13px; }
  .nav a:hover { border-color:var(--acc); }

  /* 对比表格 */
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { padding:10px 10px; text-align:left; border-bottom:1px solid var(--border); }
  th { color:var(--mut); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  td.num, th.num { text-align:right; font-variant-numeric: tabular-nums; }
  tbody tr:hover { background:#16203280; }
  .case-title { font-weight:600; }
  .case-meta { color:var(--mut); font-size:12px; margin-top:2px; }

  /* 状态徽章 */
  .badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:600; }
  .badge.pass { background:rgba(34,197,94,.15); color:var(--ok); border:1px solid rgba(34,197,94,.4); }
  .badge.fail { background:rgba(239,68,68,.15); color:var(--bad); border:1px solid rgba(239,68,68,.4); }

  /* 评分色阶（绿→黄→红） */
  .score { font-weight:700; }
  .score.hi { color:var(--ok); }
  .score.mid { color:var(--warn); }
  .score.lo { color:var(--bad); }

  /* 评分柱状条（纯 CSS，不依赖图表库） */
  .bar-row { display:flex; align-items:center; gap:12px; margin:8px 0; }
  .bar-row .name { width:160px; font-size:13px; }
  .bar-track { flex:1; background:#0b1220; border:1px solid var(--border); border-radius:8px; height:24px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:8px 0 0 8px; background:linear-gradient(90deg, var(--acc), #0ea5e9); transition:width .4s ease; }
  .bar-row .val { width:54px; text-align:right; font-variant-numeric: tabular-nums; font-weight:600; }

  /* 汇总小指标：6 张卡片用 3 列两行排，更整齐 */
  .kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px; }
  @media (max-width:820px){ .kpis{ grid-template-columns:repeat(2,1fr); } .bar-row .name{ width:110px; } }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .kpi .k { font-size:12px; color:var(--mut); }
  .kpi .v { font-size:22px; font-weight:700; margin-top:4px; }

  .err { color:var(--bad); }
  .hidden { display:none; }
  footer { color:var(--mut); font-size:12px; text-align:center; padding:16px 0 32px; }
  footer a { color:var(--acc); }
</style>
</head>
<body>
<header>
  <h1>📊 Demo 评估对比台</h1>
  <span class="sub">EcomResearcher · 三个标准 Demo Case 的评估结果对比</span>
  <span class="pill" id="loadState">加载中…</span>
</header>

<main>
  <!-- 快速导航到三个 case 的报告 -->
  <div class="card">
    <strong>快速导航</strong>
    <div class="nav" id="caseNav" style="margin-top:10px;"></div>
  </div>

  <!-- 汇总 KPI -->
  <div class="kpis" id="kpis"></div>

  <!-- 评分对比柱状条 -->
  <div class="card">
    <strong>机会评分对比</strong>
    <div id="barStrip" style="margin-top:12px;"></div>
    <div class="pill" style="margin-top:8px;">满分 10 · 色阶：≥7 绿 / 5–7 黄 / &lt;5 红</div>
  </div>

  <!-- 详细对比表格 -->
  <div class="card">
    <strong>评估明细</strong>
    <div style="overflow-x:auto; margin-top:10px;">
      <table id="evalTable">
        <thead>
          <tr>
            <th>Case</th>
            <th class="num">Overall Score</th>
            <th class="num">Confidence</th>
            <th class="num">Evidence</th>
            <th class="num">Fallbacks</th>
            <th class="num">Retries</th>
            <th class="num">Policy Blocks</th>
            <th class="num">LLM/Search</th>
            <th class="num">Duration</th>
            <th>Quality</th>
            <th>报告</th>
          </tr>
        </thead>
        <tbody id="evalBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 错误兜底 -->
  <div class="card hidden err" id="errCard"></div>
</main>

<footer>
  数据来源：<code>/outputs/ecommerce/demo-cases/case-index.json</code> ·
  调研入口：<a href="/site/ecommerce.html">EcomResearcher 主页</a>
</footer>

<script>
const MANIFEST_URL = "/outputs/ecommerce/demo-cases/case-index.json";
const $ = (id) => document.getElementById(id);

function scoreClass(s){ if(s==null) return "score"; return s>=7?"score hi":(s>=5?"score mid":"score lo"); }
function fmtMs(ms){ if(ms==null) return "-"; const s=ms/1000; return s>=60 ? `${(s/60).toFixed(1)}m` : `${s.toFixed(1)}s`; }
function pct(x){ if(x==null) return "-"; return `${(x*100).toFixed(0)}%`; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function fail(msg){
  $("loadState").textContent = "加载失败";
  $("loadState").className = "pill bad";
  const e = $("errCard");
  e.classList.remove("hidden");
  e.textContent = msg;
}

function render(cases){
  if(!Array.isArray(cases) || cases.length===0){ fail("清单为空或格式不正确"); return; }

  // 使用清单内联的 summary 字段（更稳，少一次网络请求）
  const rows = cases.map(c => ({ ...c, s: c.summary || {} }));
  const successfulRows = rows.filter(c => c.status !== "error");

  // 快速导航
  $("caseNav").innerHTML = rows.map(c =>
    `<a href="${esc(c.report || "#")}" target="_blank" rel="noopener">📄 ${esc(c.title)} <span style="color:var(--mut);">· ${esc(c.depth||"")}</span></a>`
  ).join("");

  // 汇总 KPI
  const n = rows.length;
  const metricRows = successfulRows.length ? successfulRows : rows;
  const avgScore = (metricRows.reduce((a,r)=>a+(r.s.overall_score||0),0)/metricRows.length).toFixed(2);
  const avgConf  = (metricRows.reduce((a,r)=>a+(r.s.confidence||0),0)/metricRows.length).toFixed(2);
  const totalEv  = metricRows.reduce((a,r)=>a+(r.s.evidence_count||0),0);
  const totalFb  = metricRows.reduce((a,r)=>a+(r.s.fallback_count||0),0);
  // 治理指标汇总：重试次数 / 策略拦截 / LLM 调用 / 检索调用（来自 summarize_governance）
  const totalRetries      = metricRows.reduce((a,r)=>a+(r.s.retry_count||0),0);
  const totalPolicyBlocks = metricRows.reduce((a,r)=>a+(r.s.policy_block_count||0),0);
  const totalLlmCalls     = metricRows.reduce((a,r)=>a+(r.s.llm_call_count||0),0);
  const totalSearchCalls  = metricRows.reduce((a,r)=>a+(r.s.search_call_count||0),0);
  $("kpis").innerHTML = `
    <div class="kpi"><div class="k">Cases</div><div class="v">${n}</div></div>
    <div class="kpi"><div class="k">平均评分</div><div class="v ${scoreClass(parseFloat(avgScore))}">${avgScore} / 10</div></div>
    <div class="kpi"><div class="k">平均置信度</div><div class="v">${pct(parseFloat(avgConf))}</div></div>
    <div class="kpi"><div class="k">证据 / 降级</div><div class="v">${totalEv} <span style="color:var(--mut); font-size:14px;">/ ${totalFb}</span></div></div>
    <div class="kpi"><div class="k">重试 / 策略拦截</div><div class="v ${totalPolicyBlocks>0?'bad':''}">${totalRetries} <span style="color:var(--mut); font-size:14px;">/ ${totalPolicyBlocks}</span></div></div>
    <div class="kpi"><div class="k">LLM / Search 调用</div><div class="v">${totalLlmCalls} <span style="color:var(--mut); font-size:14px;">/ ${totalSearchCalls}</span></div></div>
  `;

  // 评分柱状条
  const maxScore = 10;
  $("barStrip").innerHTML = rows.map(r => {
    if(r.status === "error"){
      return `
      <div class="bar-row">
        <div class="name">${esc(r.title)}<div style="color:var(--bad); font-size:11px;">export failed</div></div>
        <div class="bar-track"><div class="bar-fill" style="width:2%; background:var(--bad);"></div></div>
        <div class="val bad">ERR</div>
      </div>`;
    }
    const v = r.s.overall_score;
    const w = v==null ? 0 : Math.max(2, (v/maxScore)*100); // 至少 2% 让 0 分也能看见
    const cls = scoreClass(v);
    return `
      <div class="bar-row">
        <div class="name">${esc(r.title)}<div style="color:var(--mut); font-size:11px;">${esc(r.depth||"")}</div></div>
        <div class="bar-track"><div class="bar-fill" style="width:${w}%;"></div></div>
        <div class="val ${cls}">${v==null?"-":v.toFixed(1)}</div>
      </div>`;
  }).join("");

  // 明细表
  $("evalBody").innerHTML = rows.map(r => {
    if(r.status === "error"){
      // 错误行：每个数值列都用 - 占位，保证列数 == 表头列数（11 列）
      return `
      <tr>
        <td>
          <div class="case-title">${esc(r.title)}</div>
          <div class="case-meta">${esc(r.query||"")} · ${esc(r.target_market||"")} · ${(r.platforms||[]).map(esc).join(", ")}</div>
          <div class="bad" style="font-size:12px; margin-top:4px;">${esc(r.error || "export failed")}</div>
        </td>
        <td class="num bad">ERR</td>
        <td class="num">-</td>
        <td class="num">-</td>
        <td class="num">-</td>
        <td class="num">-</td>
        <td class="num">-</td>
        <td class="num">-</td>
        <td class="num">-</td>
        <td><span class="badge fail">ERROR</span></td>
        <td>-</td>
      </tr>`;
    }
    const s = r.s;
    const passed = s.quality_passed;
    const badge = passed
      ? `<span class="badge pass">PASS</span>`
      : (passed===false ? `<span class="badge fail">FAIL</span>` : `<span class="badge" style="background:#0b1220; color:var(--mut); border:1px solid var(--border);">N/A</span>`);
    const platforms = (r.platforms||[]).join(", ");
    return `
      <tr>
        <td>
          <div class="case-title">${esc(r.title)}</div>
          <div class="case-meta">${esc(r.query||"")} · ${esc(r.target_market||"")} · ${esc(platforms)}</div>
        </td>
        <td class="num ${scoreClass(s.overall_score)}">${s.overall_score==null?"-":Number(s.overall_score).toFixed(2)}</td>
        <td class="num">${pct(s.confidence)}</td>
        <td class="num">${s.evidence_count==null?"-":s.evidence_count}</td>
        <td class="num ${s.fallback_count>0?'warn':''}">${s.fallback_count==null?"-":s.fallback_count}</td>
        <td class="num">${s.retry_count==null?"-":s.retry_count}</td>
        <td class="num ${s.policy_block_count>0?'bad':''}">${s.policy_block_count==null?"-":s.policy_block_count}</td>
        <td class="num">${(s.llm_call_count==null&&s.search_call_count==null)?"-":`${s.llm_call_count||0}/${s.search_call_count||0}`}</td>
        <td class="num">${fmtMs(s.duration_ms)}</td>
        <td>${badge}</td>
        <td>${r.report ? `<a href="${esc(r.report)}" target="_blank" rel="noopener" style="color:var(--acc);">查看 ↗</a>` : "-"}</td>
      </tr>`;
  }).join("");

  $("loadState").textContent = `已加载 ${n} 个 case`;
  $("loadState").className = "pill ok";
}

async function load(){
  try {
    const res = await fetch(MANIFEST_URL, { cache: "no-store" });
    if(res.status === 404){ fail(`找不到清单文件：${MANIFEST_URL}（HTTP 404）`); return; }
    if(!res.ok){ fail(`加载清单失败：HTTP ${res.status}`); return; }
    const data = await res.json();
    render(data);
  } catch(err){
    fail("无法加载评估清单：" + (err && err.message ? err.message : err));
  }
}

load();
</script>
</body>
</html>
